name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check app/ tests/
      - run: uv run mypy app
      - run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # Deploys to the VPS on every push to main once both CI jobs above pass.
  # Requires repo secrets DEPLOY_SSH_KEY / DEPLOY_HOST / DEPLOY_USER — see
  # DEPLOY.md "CI/CD" section for how to create them.
  deploy:
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Frontend is built here, on the runner, not on the VPS — the server
      # doesn't have the RAM for a JS build (see DEPLOY.md).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync frontend build
        run: |
          rsync -avz --delete frontend/dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/srv/dh/frontend-dist/"

      - name: Deploy backend
        run: |
          # The VPS is small enough that a transient SSH hiccup isn't rare —
          # one retry before failing the whole workflow.
          for attempt in 1 2; do
            if ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
              set -e
              cd /srv/dh
              git fetch origin main
              git reset --hard origin/main
              docker compose -f docker-compose.prod.yml up -d --build
              docker image prune -f
              docker builder prune -af
            '; then
              exit 0
            fi
            echo "Deploy attempt $attempt failed, retrying in 10s..."
            sleep 10
          done
          exit 1
