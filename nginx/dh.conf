# DH — nginx site config for NATIVE installation on the host (not Docker).
# Only `db` and `api` run in Docker (docker-compose.prod.yml); this config
# runs as the system nginx, serving the static frontend build straight off
# disk and reverse-proxying API/admin traffic to the api container on
# 127.0.0.1:8000. See DEPLOY.md for install steps (paths below, TLS via
# certbot, etc.).
#
# Install: copy to /etc/nginx/sites-available/dh, symlink into
# sites-enabled, replace CHANGE_ME.example and the two /srv/dh paths, then
# `nginx -t && systemctl reload nginx`.

# Auth endpoints get their own zone: 5 requests/minute per IP, independent of
# the rest of the site — the app itself has no rate limiting of its own.
limit_req_zone $binary_remote_addr zone=dh_auth:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name CHANGE_ME.example;

    # Required for certbot's HTTP-01 challenge before a certificate exists.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name CHANGE_ME.example;

    ssl_certificate     /etc/letsencrypt/live/CHANGE_ME.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CHANGE_ME.example/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 15M;

    # Built frontend (`npm run build` output) — see DEPLOY.md for how it gets here.
    root /srv/dh/frontend-dist;
    index index.html;

    # Tighter throttle on auth endpoints — brute force / password-reset spam.
    location /api/v1/auth/ {
        limit_req zone=dh_auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prefix match — also covers /admin-tools (SQLAdmin lives at /admin,
    # the custom Jinja admin pages at /admin-tools).
    location /admin {
        proxy_pass http://127.0.0.1:8000/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Served straight from disk — same directory the api container's
    # MEDIA_HOST_PATH bind-mount points at (see .env.example), so uploads
    # written by the api show up here with no extra copy step.
    location /media/ {
        alias /srv/dh/media/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
